<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NCAA Pick 8 Pool</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="header">
    <h1>🏀 NCAA Pick 8 Pool</h1>
    <div class="meta" id="meta">Loading...</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('leaderboard')">Leaderboard</button>
    <button class="tab" onclick="showTab('picks')">Picks</button>
    <button class="tab" onclick="showTab('analysis')">Analysis</button>
    <button class="tab" onclick="showTab('scenarios')">Scenarios</button>
    <button class="tab" onclick="showTab('odds')">Odds</button>
  </div>

  <div id="leaderboard" class="tab-content active">
    <div id="leaderboard-content">Loading...</div>
  </div>

  <div id="picks" class="tab-content">
    <div id="picks-content">Loading...</div>
  </div>

  <div id="analysis" class="tab-content">
    <div id="analysis-content">Loading...</div>
  </div>

  <div id="scenarios" class="tab-content">
    <div id="scenarios-content">Loading...</div>
  </div>

  <div id="odds" class="tab-content">
    <div id="odds-content">Click the Odds tab to run simulation...</div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    let boardData = null;
    let oddsLoaded = false;

    function showTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[onclick="showTab('${name}')"]`).classList.add('active');
      document.getElementById(name).classList.add('active');
      if (name === 'odds' && !oddsLoaded) {
        loadOdds();
      }
    }

    function goToPicks(playerName) {
      showTab('picks');
      const id = 'player-' + playerName.replace(/\s+/g, '-');
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function fmt(n) {
      return '$' + n.toLocaleString();
    }

    function openModal(title, bodyHtml) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').innerHTML = bodyHtml;
      document.getElementById('modal-overlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
    }

    // ── Leaderboard ──────────────────────────────────────────────────────────

    function renderLeaderboard(data) {
      const { players, prizes, total_pot, num_entries } = data;
      const prizeMap = {};
      prizes.forEach(p => prizeMap[p.place] = p.amount);

      let html = `
        <div class="pot-banner">
          💰 Total Pot: ${fmt(total_pot)} &nbsp;|&nbsp; ${num_entries} Entries
          <span class="prize-breakdown">${prizes.map(p => `${p.label}: ${fmt(p.amount)}`).join(' &nbsp;·&nbsp; ')}</span>
        </div>
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Points</th>
              <th>Potential Left</th>
              <th>Prize</th>
            </tr>
          </thead>
          <tbody>
      `;

      players.forEach(p => {
        const prize = prizeMap[p.rank];
        const rankClass = p.rank === 1 ? 'rank-1' : p.rank === 2 ? 'rank-2' : p.rank === 3 ? 'rank-3' : '';
        const prizeCell = prize ? `<span class="prize-badge">${fmt(prize)}</span>` : '—';
        html += `
          <tr class="${rankClass}">
            <td class="rank-cell">${p.rank === 1 ? '🥇' : p.rank === 2 ? '🥈' : p.rank === 3 ? '🥉' : p.rank}</td>
            <td class="player-name"><a class="player-link" onclick="goToPicks('${p.name}')">${p.name}</a></td>
            <td class="points">${p.current_points}</td>
            <td class="potential">${p.potential_left}</td>
            <td>${prizeCell}</td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      document.getElementById('leaderboard-content').innerHTML = html;
    }

    // ── Picks ────────────────────────────────────────────────────────────────

    function renderPicks(data) {
      const { players } = data;
      let html = '';

      players.forEach(p => {
        const statusIcon = (pick) => pick.eliminated ? '❌' : pick.espn_name ? '✅' : '❓';
        const seedDisplay = (pick) => pick.seed !== '?' ? `#${pick.seed}` : '?';

        html += `
          <div class="player-card" id="player-${p.name.replace(/\s+/g, '-')}">
            <div class="player-card-header">
              <span class="player-card-name">${p.name}</span>
              <span class="player-card-stats">
                <strong>${p.current_points} pts</strong>
                <span class="muted">· ${p.potential_left} potential left</span>
              </span>
            </div>
            <table class="picks-table">
              <thead>
                <tr>
                  <th>Team</th>
                  <th>Seed</th>
                  <th>Wins</th>
                  <th>Points</th>
                  <th>Max Left</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
        `;

        p.picks.forEach(pick => {
          const rowClass = pick.eliminated ? 'eliminated-row' : '';
          html += `
            <tr class="${rowClass}">
              <td class="team-name">${pick.espn_name || pick.pick_name}${pick.espn_name && pick.espn_name !== pick.pick_name ? ` <span class="fuzzy-note">(entered: ${pick.pick_name})</span>` : ''}</td>
              <td class="seed-cell">${seedDisplay(pick)}</td>
              <td>${pick.wins}</td>
              <td class="points-cell">${pick.points}</td>
              <td class="potential-cell">${pick.potential_left}</td>
              <td>${statusIcon(pick)}</td>
            </tr>
          `;
        });

        html += `
              </tbody>
            </table>
          </div>
        `;
      });

      document.getElementById('picks-content').innerHTML = html;
    }

    // ── Analysis (Heat Map) ───────────────────────────────────────────────────

    function renderAnalysis(data) {
      const { players } = data;

      // Count picks per team and track who picked each
      const teamCounts = {};  // espn_name -> { count, seed, pickedBy: [names] }

      players.forEach(p => {
        p.picks.forEach(pick => {
          const key = pick.espn_name || pick.pick_name;
          if (!teamCounts[key]) {
            teamCounts[key] = { count: 0, seed: pick.seed, points: pick.points, pickedBy: [] };
          }
          teamCounts[key].count++;
          teamCounts[key].pickedBy.push(p.name);
        });
      });

      const teams = Object.entries(teamCounts)
        .map(([name, d]) => ({ name, ...d }))
        .sort((a, b) => b.count - a.count || (a.seed === '?' ? 99 : a.seed) - (b.seed === '?' ? 99 : b.seed));

      const maxCount = Math.max(...teams.map(t => t.count), 1);
      const totalPicks = players.length * 8;
      const uniqueTeams = teams.length;

      let html = `
        <div class="analysis-summary">
          <span>${uniqueTeams} teams picked</span>
          <span class="muted">·</span>
          <span>${totalPicks} total picks across ${players.length} players</span>
          <span class="muted">·</span>
          <span>Click any tile to see who picked that team</span>
        </div>
        <div class="heatmap-grid">
      `;

      teams.forEach(team => {
        const intensity = team.count / maxCount;
        const bg = heatColor(intensity);
        const seedLabel = team.seed !== '?' ? `#${team.seed}` : '?';
        const ptsLabel = `${team.points} pt${team.points !== 1 ? 's' : ''}`;
        const pickLabel = team.count === 1 ? '1 pick' : `${team.count} picks`;
        const pickedByJson = JSON.stringify(team.pickedBy).replace(/"/g, '&quot;');

        html += `
          <div class="heatmap-tile" style="background:${bg}"
               onclick="showTeamPickers('${team.name.replace(/'/g, "\\'")}', ${team.count}, '${seedLabel}', ${pickedByJson})">
            <div class="heatmap-team">${team.name}</div>
            <div class="heatmap-seed">${seedLabel} · ${ptsLabel}</div>
            <div class="heatmap-count">${pickLabel}</div>
            <div class="heatmap-bar">
              <div class="heatmap-bar-fill" style="width:${Math.round(intensity * 100)}%"></div>
            </div>
          </div>
        `;
      });

      html += '</div>';
      document.getElementById('analysis-content').innerHTML = html;
    }

    function heatColor(intensity) {
      // 0 = cool blue-gray, 1 = warm orange
      const r = Math.round(20 + intensity * 220);
      const g = Math.round(30 + intensity * 100);
      const b = Math.round(60 - intensity * 30);
      return `rgb(${r},${g},${b})`;
    }

    function showTeamPickers(teamName, count, seed, pickedBy) {
      const pickLabel = count === 1 ? '1 pick' : `${count} picks`;
      let body = `<p class="modal-meta">Seed ${seed} · ${pickLabel}</p>`;
      if (pickedBy.length === 0) {
        body += `<p class="modal-empty">No one picked this team.</p>`;
      } else {
        body += '<ul class="modal-list">';
        pickedBy.forEach(name => {
          body += `<li><a class="player-link" onclick="closeModal(); goToPicks('${name}')">${name}</a></li>`;
        });
        body += '</ul>';
      }
      openModal(teamName, body);
    }

    // ── Scenarios ─────────────────────────────────────────────────────────────

    function renderScenarios(data) {
      const { scenarios } = data;
      if (!scenarios || scenarios.length === 0) {
        document.getElementById('scenarios-content').innerHTML = '<p class="muted" style="padding:24px">No scenario data available.</p>';
        return;
      }

      let html = '';

      scenarios.forEach(s => {
        const badge = s.in_contention
          ? `<span class="badge badge-green">${s.rank === 1 ? '🏆 Leading' : '✅ In Contention'}</span>`
          : `<span class="badge badge-red">❌ Eliminated</span>`;

        const gap = s.points_needed > 0
          ? `<span class="scenario-gap">Need <strong>${s.points_needed}</strong> more pts to lead</span>`
          : '';

        html += `
          <div class="scenario-card">
            <div class="scenario-header">
              <span class="scenario-name">${s.name}</span>
              <span class="scenario-meta">
                ${badge}
                ${gap}
                <span class="muted">Best case: <strong>${s.best_case} pts</strong></span>
              </span>
            </div>
            <div class="scenario-body">
        `;

        // Root For
        if (s.root_for.length > 0) {
          html += `<div class="scenario-section">
            <div class="scenario-section-title">🟢 Root For</div>
            <div class="scenario-teams">`;
          s.root_for.forEach(t => {
            const opp = t.next_opponent ? `vs <em>${t.next_opponent}</em> next` : 'next game TBD';
            html += `
              <div class="scenario-team-tile">
                <span class="st-name">${t.team}</span>
                <span class="st-seed">#${t.seed}</span>
                <span class="st-potential">+${t.potential} pts possible</span>
                <span class="st-opp">${opp}</span>
              </div>`;
          });
          html += `</div></div>`;
        }

        // Root Against
        if (s.root_against.length > 0) {
          html += `<div class="scenario-section">
            <div class="scenario-section-title">🔴 Root Against</div>
            <div class="scenario-teams">`;
          s.root_against.forEach(t => {
            const opp = t.next_opponent ? `vs <em>${t.next_opponent}</em> next` : 'next game TBD';
            const pickers = t.players.join(', ');
            html += `
              <div class="scenario-team-tile scenario-threat">
                <span class="st-name">${t.team}</span>
                <span class="st-seed">#${t.seed}</span>
                <span class="st-potential threat-pts">+${t.potential} pts for ${pickers}</span>
                <span class="st-opp">${opp}</span>
              </div>`;
          });
          html += `</div></div>`;
        }

        html += `</div></div>`;
      });

      document.getElementById('scenarios-content').innerHTML = html;
    }

    // ── Odds (Monte Carlo) ────────────────────────────────────────────────────

    async function loadOdds() {
      document.getElementById('odds-content').innerHTML = '<p class="muted" style="padding:24px">Running 10,000 simulations...</p>';
      try {
        const resp = await fetch('/api/simulate');
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        renderOdds(data);
        oddsLoaded = true;
      } catch (e) {
        document.getElementById('odds-content').innerHTML =
          `<p class="muted" style="padding:24px">Error loading simulation: ${e.message}</p>`;
      }
    }

    function renderOdds(data) {
      const { players, simulations } = data;

      let html = `
        <div class="odds-banner">
          🎲 Monte Carlo Simulation &nbsp;·&nbsp; ${simulations.toLocaleString()} runs &nbsp;·&nbsp; 50/50 each remaining game
          <button class="odds-refresh-btn" onclick="oddsLoaded=false; loadOdds()">↻ Refresh</button>
        </div>
        <table class="odds-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>🥇 1st</th>
              <th>🥈 2nd</th>
              <th>🥉 3rd</th>
              <th>4th</th>
              <th>Best</th>
              <th>Worst</th>
            </tr>
          </thead>
          <tbody>
      `;

      players.forEach((p, i) => {
        const eliminated = p.eliminated;
        const rowClass = eliminated ? 'odds-eliminated' : '';
        const winBar = eliminated ? '' :
          `<div class="odds-bar"><div class="odds-bar-fill" style="width:${Math.min(p.win_pct, 100)}%"></div></div>`;
        const winDisplay = eliminated
          ? '<span class="odds-zero">0%</span>'
          : `<span class="odds-win-pct">${p.win_pct}%</span>${winBar}`;
        const pct = (val) => val > 0 ? `<span class="odds-place">${val}%</span>` : '<span class="odds-zero">0%</span>';

        html += `
          <tr class="${rowClass}">
            <td class="rank-cell">${i === 0 && !eliminated ? '🥇' : i === 1 && !eliminated ? '🥈' : i === 2 && !eliminated ? '🥉' : i + 1}</td>
            <td class="player-name"><a class="player-link" onclick="goToPicks('${p.name}')">${p.name}</a></td>
            <td class="odds-win-cell">${winDisplay}</td>
            <td>${pct(p.second_pct)}</td>
            <td>${pct(p.third_pct)}</td>
            <td>${pct(p.fourth_pct)}</td>
            <td>${p.best_finish}</td>
            <td class="muted">${p.worst_finish}</td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
        <p class="odds-note">Assumes equal probability for each remaining game. Results update every 5 minutes.</p>
      `;

      document.getElementById('odds-content').innerHTML = html;
    }

    // ── Refresh ───────────────────────────────────────────────────────────────

    async function refresh() {
      try {
        const resp = await fetch('/api/board');
        const data = await resp.json();
        boardData = data;
        renderLeaderboard(data);
        renderPicks(data);
        renderAnalysis(data);
        renderScenarios(data);
        document.getElementById('meta').textContent =
          `Last updated: ${new Date().toLocaleTimeString()} · Refreshes every 60s`;
      } catch (e) {
        document.getElementById('meta').textContent = 'Error loading data — retrying...';
      }
    }

    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
